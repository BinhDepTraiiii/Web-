<!DOCTYPE html>
<html>
<head>
<title>Quản lý kho hàng </title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<h1>Quản lý kho hàng</h1>
<h2> </h2>
<div class="form-row">
  <input type="text" placeholder="Tên sản phẩm" id="product-name">
  <input type="text" placeholder="Mã sản phẩm" id="product-code">
  <input type="text" placeholder="Số lượng" id="quantity">
  <input type="text" placeholder="Giá tiền" id="price">
  <button id="add-product" class="add-product">Thêm sản phẩm</button>
</div>

    
</div>
<table border="1">
    <thead>
    <tr> 
        <th>Tên sản phẩm</th>
        <th>Mã sản phẩm</th>
        <th>Số lượng</th>
        <th>Giá tiền</th>
    </tr>
    </thead>
    <tbody id = "productList">
    </tbody>
</table>
<script src="../js/script.js"></script>
</body>
</html>
